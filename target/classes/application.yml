spring:
  application:
    name: java-reactive-messaging
  profiles:
    active: dev

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/ecommerce
    username: user
    password: password

  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/ecommerce
    user: user
    password: password
    locations: classpath:db/migration

  cassandra:
    contact-points: localhost:9042
    local-datacenter: datacenter1
    keyspace-name: ecommerce
    schema-action: create_if_not_exists
    connection:
      connect-timeout: 10s
      init-query-timeout: 10s
    request:
      timeout: 10s

  data:
    redis:
      host: localhost
      port: 6379

  main:
    web-application-type: reactive

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
